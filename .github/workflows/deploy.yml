name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "dist,package.json,package-lock.json"
          target: "~/my-ai-crm"

      - name: Install Prod Dependencies and Restart Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Ensure the target directory exists
            mkdir -p ~/my-ai-crm
            cd ~/my-ai-crm
            
            # Install production dependencies
            npm ci --omit=dev
            
            # Set up PM2 globally if not installed
            if ! command -v pm2 &> /dev/null
            then
                npm install -g pm2
            fi
            
            # Start or restart the PM2 process with PORT=3003
            pm2 describe my-ai-crm > /dev/null
            if [ $? -eq 0 ]; then
                PORT=3003 pm2 restart my-ai-crm --update-env
            else
                PORT=3003 pm2 start dist/server.cjs --name my-ai-crm
            fi
            pm2 save
